<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nito games</title>

    <style>
        :root {
            --bg: #0f3460;
            --card: #16213e;
            --red: #e94560;
            --white: #ffffff;
            --hover-blue: #007bff;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--white);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            text-align: center;
            touch-action: manipulation;
            overflow-x: hidden;
        }

        /* --- نظام تسجيل الدخول (إضافات ضرورية) --- */
        #auth-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .auth-box {
            background: var(--card);
            padding: 30px;
            border-radius: 20px;
            width: 300px;
            border: 2px solid var(--red);
        }

        .auth-box input,
        .auth-box select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            outline: none;
            box-sizing: border-box;
            background: #1a1a2e;
            color: white;
        }

        .auth-nav-btns {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .auth-nav-btns button {
            flex: 1;
            padding: 10px;
            cursor: pointer;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            background: #1a1a2e;
            color: white;
        }

        .auth-nav-btns button.active {
            background: var(--red);
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
        }

        .logout-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 8px 15px;
            background: var(--red);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        /* --- الستايل الأصلي ديالك (متبدل والو) --- */
        .container {
            padding: 50px 20px;
            display: none;
        }

        .logo {
            font-size: 3rem;
            margin-bottom: 40px;
        }

        .logo span {
            color: var(--red);
        }

        .games-grid {
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
        }

        .game-card {
            background: var(--card);
            border: 2px solid #1a1a2e;
            border-radius: 20px;
            padding: 40px;
            width: 280px;
            cursor: pointer;
            transition: 0.3s;
        }

        .game-card:hover {
            border-color: var(--red);
            transform: translateY(-10px);
        }

        .play-btn {
            width: 100%;
            padding: 15px;
            background: var(--red);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            font-size: 1.1rem;
        }

        .diff-btn {
            width: 100%;
            padding: 15px;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 15px;
            transition: 0.4s;
            font-size: 1.1rem;
        }

        .easy-btn {
            background-color: #28a745;
        }

        .medium-btn {
            background-color: #fd7e14;
        }

        .hard-btn {
            background-color: #dc3545;
        }

        .diff-btn:hover {
            background-color: var(--hover-blue) !important;
            transform: scale(1.05);
        }

        .full-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a1a2e;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 10px;
            margin: 20px;
        }

        .cell {
            background: var(--card);
            border-radius: 15px;
            font-size: 3.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--red);
            height: 100px;
        }

        #snakeCanvas {
            background: #000;
            border: 5px solid var(--card);
            border-radius: 10px;
            max-width: 90vw;
            max-height: 50vh;
        }

        .snake-game-container {
            display: flex;
            align-items: center;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .controls-wrapper {
            display: grid;
            grid-template-columns: 60px 60px 60px;
            grid-template-rows: 60px 60px 60px;
            gap: 10px;
        }

        .ctrl-btn {
            width: 60px;
            height: 60px;
            background: var(--card);
            border: 2px solid var(--red);
            color: white;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-up {
            grid-column: 2;
            grid-row: 1;
        }

        .btn-left {
            grid-column: 1;
            grid-row: 2;
        }

        .btn-right {
            grid-column: 3;
            grid-row: 2;
        }

        .btn-down {
            grid-column: 2;
            grid-row: 3;
        }

        .back-btn {
            background: transparent;
            border: 2px solid white;
            padding: 10px 25px;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            margin-top: 20px;
        }

        .row-btns {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .status-msg {
            margin: 15px 0;
            font-size: 1.8rem;
            font-weight: bold;
            min-height: 2.2rem;
        }
    </style>
</head>

<body>

    <div id="auth-screen">
        <h1 class="logo">nito<span>games</span></h1>
        <div class="auth-box">
            <div class="auth-nav-btns">
                <button id="btn-show-login" class="active" onclick="toggleAuth('login')">تسجيل دخول</button>
                <button id="btn-show-signup" onclick="toggleAuth('signup')">حساب جديد</button>
            </div>

            <div id="login-form" class="auth-form active">
                <input type="text" id="l-user" placeholder="اسم المستخدم">
                <input type="password" id="l-pass" placeholder="كلمة المرور">
                <button class="play-btn" onclick="doLogin()">دخول</button>
            </div>

            <div id="signup-form" class="auth-form">
                <input type="text" id="s-user" placeholder="اسم مستخدم جديد">
                <input type="password" id="s-pass" placeholder="كلمة مرور">
                <select id="s-gender">
                    <option value="male">ولد</option>
                    <option value="female">بنت</option>
                </select>
                <button class="play-btn" style="background:#28a745" onclick="doSignup()">إنشاء حساب</button>
            </div>
            <p id="auth-msg" style="color:#ff9999; font-size:0.8rem; margin-top:10px"></p>
        </div>
    </div>

    <div id="main-menu" class="container">
        <button class="logout-btn" onclick="doLogout()">تسجيل الخروج</button>
        <h1 class="logo">nito<span>games</span></h1>
        <div class="games-grid">
            <div class="game-card" onclick="showXO()">
                <div style="font-size:5rem">❌⭕</div>
                <h2>لعبة XO</h2>
                <button class="play-btn">العب الآن</button>
            </div>
            <div class="game-card" onclick="showSnake()">
                <div style="font-size:5rem">🐍</div>
                <h2>لعبة الدودة</h2>
                <button class="play-btn">العب الآن</button>
            </div>
            <div class="game-card" onclick="showChess()">
                <div style="font-size:5rem">♟️</div>
                <h2>الشطرنج</h2>
                <button class="play-btn">العب الآن</button>
            </div>
        </div>
    </div>

    <div id="xo-ui" class="full-screen">
        <div id="xo-menu" style="width: 300px;">
            <h2>اختر المستوى</h2>
            <button class="diff-btn easy-btn" onclick="startXO('easy')">سهل</button>
            <button class="diff-btn medium-btn" onclick="startXO('medium')">متوسط</button>
            <button class="diff-btn hard-btn" onclick="startXO('impossible')">مستحيل</button>
            <button class="back-btn" style="width:100%" onclick="hideAll()">رجوع</button>
        </div>
        <div id="xo-play" style="display:none">
            <div class="board">
                <div class="cell" onclick="xoMove(0)"></div>
                <div class="cell" onclick="xoMove(1)"></div>
                <div class="cell" onclick="xoMove(2)"></div>
                <div class="cell" onclick="xoMove(3)"></div>
                <div class="cell" onclick="xoMove(4)"></div>
                <div class="cell" onclick="xoMove(5)"></div>
                <div class="cell" onclick="xoMove(6)"></div>
                <div class="cell" onclick="xoMove(7)"></div>
                <div class="cell" onclick="xoMove(8)"></div>
            </div>
            <div id="xo-msg" class="status-msg"></div>
            <div class="row-btns">
                <button id="xo-retry" class="play-btn" style="display:none; width:auto; margin-top:0;"
                    onclick="resetXO()">إعادة اللعب</button>
                <button class="back-btn" style="margin-top:0;" onclick="hideAll()">رجوع</button>
            </div>
        </div>
    </div>

    <div id="snake-ui" class="full-screen">
        <h2 id="snake-score">النقاط: 0</h2>
        <div class="snake-game-container">
            <div class="controls-wrapper">
                <button class="ctrl-btn btn-up" onclick="changeDir('UP')">▲</button>
                <button class="ctrl-btn btn-left" onclick="changeDir('LEFT')">◀</button>
                <button class="ctrl-btn btn-right" onclick="changeDir('RIGHT')">▶</button>
                <button class="ctrl-btn btn-down" onclick="changeDir('DOWN')">▼</button>
            </div>
            <canvas id="snakeCanvas" width="360" height="360"></canvas>
        </div>
        <div id="snake-msg" class="status-msg"></div>
        <div class="row-btns">
            <button id="retry-sn" class="play-btn" style="display:none; width:auto; margin-top:0;"
                onclick="showSnake()">إعادة اللعب</button>
            <button class="back-btn" style="margin-top:0;" onclick="hideAll()">رجوع</button>
        </div>
    </div>

    <div id="chess-ui" class="full-screen">
        <h2>قيد التطوير ⚙️</h2>
        <button class="back-btn" onclick="hideAll()">رجوع</button>
    </div>

    <script>
        // --- منطق الدخول والخروج ---
        function toggleAuth(type) {
            document.getElementById('login-form').classList.toggle('active', type === 'login');
            document.getElementById('signup-form').classList.toggle('active', type === 'signup');
            document.getElementById('btn-show-login').classList.toggle('active', type === 'login');
            document.getElementById('btn-show-signup').classList.toggle('active', type === 'signup');
            document.getElementById('auth-msg').innerText = "";
        }

        function doSignup() {
            let u = document.getElementById('s-user').value.trim();
            let p = document.getElementById('s-pass').value.trim();
            if (!u || !p) { document.getElementById('auth-msg').innerText = "دخل المعلومات!"; return; }
            let users = JSON.parse(localStorage.getItem('nUsers') || '{}');
            if (users[u]) { document.getElementById('auth-msg').innerText = "الاسم مستعمل!"; return; }
            users[u] = { p: p };
            localStorage.setItem('nUsers', JSON.stringify(users));
            startGame();
        }

        function doLogin() {
            let u = document.getElementById('l-user').value.trim();
            let p = document.getElementById('l-pass').value.trim();
            let users = JSON.parse(localStorage.getItem('nUsers') || '{}');
            if (users[u] && users[u].p === p) startGame();
            else document.getElementById('auth-msg').innerText = "خطأ في الاسم أو كلمة المرور";
        }

        function startGame() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('main-menu').style.display = 'block';
        }

        function doLogout() {
            document.getElementById('auth-screen').style.display = 'flex';
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('l-user').value = "";
            document.getElementById('l-pass').value = "";
        }

        // --- كود الألعاب ديالك (بدون تغيير) ---
        function hideAll() {
            document.querySelectorAll('.full-screen').forEach(el => el.style.display = 'none');
            document.getElementById('main-menu').style.display = 'block';
            if (snInt) clearInterval(snInt);
        }

        let xoB = Array(9).fill(""); let active = false; let diff = ""; let pStarts = true;
        function showXO() { document.getElementById('main-menu').style.display = 'none'; document.getElementById('xo-ui').style.display = 'flex'; document.getElementById('xo-menu').style.display = 'block'; document.getElementById('xo-play').style.display = 'none'; }
        function startXO(d) { diff = d; document.getElementById('xo-menu').style.display = 'none'; document.getElementById('xo-play').style.display = 'block'; resetXO(); }
        function xoMove(i) { if (xoB[i] === "" && active) { xoB[i] = "X"; document.querySelectorAll('.cell')[i].innerText = "X"; if (check(xoB, "X")) finishXO("مبروك فزتي! 🎉", "#28a745"); else if (!xoB.includes("")) finishXO("تعادل! 🤝", "white"); else { active = false; document.getElementById('xo-msg').innerText = "تفكير..."; setTimeout(ai, 500); } } }
        function ai() { let m; if (diff === 'easy') { let a = xoB.map((s, i) => s === "" ? i : null).filter(h => h !== null); m = a[Math.floor(Math.random() * a.length)]; } else m = minimaxMove(xoB); xoB[m] = "O"; document.querySelectorAll('.cell')[m].innerText = "O"; if (check(xoB, "O")) finishXO("خسرتي! 💀", "var(--red)"); else if (!xoB.includes("")) finishXO("تعادل! 🤝", "white"); else { active = true; document.getElementById('xo-msg').innerText = "دورك (X)"; } }
        function finishXO(t, c) { active = false; const m = document.getElementById('xo-msg'); m.innerText = t; m.style.color = c; document.getElementById('xo-retry').style.display = "block"; pStarts = !pStarts; }
        function resetXO() { xoB.fill(""); document.querySelectorAll('.cell').forEach(c => c.innerText = ""); document.getElementById('xo-retry').style.display = "none"; if (pStarts) { active = true; document.getElementById('xo-msg').innerText = "دورك تبدأي (X)"; } else { active = false; document.getElementById('xo-msg').innerText = "الذكاء يبدأ..."; setTimeout(ai, 800); } }
        function check(b, s) { const w = [[0, 1, 2], [3, 4, 5], [6, 7, 8], [0, 3, 6], [1, 4, 7], [2, 5, 8], [0, 4, 8], [2, 4, 6]]; return w.some(z => z.every(i => b[i] === s)); }
        function minimaxMove(b) { let best = -Infinity; let move; for (let i = 0; i < 9; i++) { if (b[i] === "") { b[i] = "O"; let s = minimax(b, 0, false); b[i] = ""; if (s > best) { best = s; move = i; } } } return move; }
        function minimax(b, d, isM) { if (check(b, "O")) return 10; if (check(b, "X")) return -10; if (!b.includes("")) return 0; if (isM) { let s = -Infinity; for (let i = 0; i < 9; i++) if (b[i] === "") { b[i] = "O"; s = Math.max(s, minimax(b, d + 1, false)); b[i] = ""; } return s; } else { let s = Infinity; for (let i = 0; i < 9; i++) if (b[i] === "") { b[i] = "X"; s = Math.min(s, minimax(b, d + 1, true)); b[i] = ""; } return s; } }

        let sn, fd, dx, dy, score, snInt, snActive = false;
        function showSnake() { document.getElementById('main-menu').style.display = 'none'; document.getElementById('snake-ui').style.display = 'flex'; document.getElementById('snake-msg').innerText = ""; document.getElementById('retry-sn').style.display = "none"; sn = [{ x: 180, y: 180 }]; dx = 20; dy = 0; score = 0; snActive = true; genFd(); if (snInt) clearInterval(snInt); snInt = setInterval(drawSn, 120); }
        function genFd() { fd = { x: Math.floor(Math.random() * 17) * 20, y: Math.floor(Math.random() * 17) * 20 }; }
        function changeDir(dir) {
            if (dir === 'UP' && dy === 0) { dx = 0; dy = -20; }
            if (dir === 'DOWN' && dy === 0) { dx = 0; dy = 20; }
            if (dir === 'LEFT' && dx === 0) { dx = -20; dy = 0; }
            if (dir === 'RIGHT' && dx === 0) { dx = 20; dy = 0; }
        }
        function drawSn() { if (!snActive) return; const ctx = document.getElementById('snakeCanvas').getContext('2d'); ctx.fillStyle = "black"; ctx.fillRect(0, 0, 360, 360); let h = { x: sn[0].x + dx, y: sn[0].y + dy }; if (h.x < 0 || h.x >= 360 || h.y < 0 || h.y >= 360 || sn.some(s => s.x === h.x && s.y === h.y)) { snActive = false; clearInterval(snInt); document.getElementById('snake-msg').innerText = "خسرتي! 💀"; document.getElementById('retry-sn').style.display = "block"; return; } sn.unshift(h); if (h.x === fd.x && h.y === fd.y) { score++; document.getElementById('snake-score').innerText = "النقاط: " + score; genFd(); } else sn.pop(); ctx.fillStyle = "red"; ctx.fillRect(fd.x, fd.y, 18, 18); ctx.fillStyle = "lime"; sn.forEach(s => ctx.fillRect(s.x, s.y, 18, 18)); }
        function showChess() { document.getElementById('main-menu').style.display = 'none'; document.getElementById('chess-ui').style.display = 'flex'; }
    </script>
</body>

</html>
